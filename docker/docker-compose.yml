# =============================================================================
# UNIT3D Upload Checker - Docker Compose Configuration
# =============================================================================
# Run commands from this docker/ directory. From the repository root, add
# `-f docker/docker-compose.yml` to compose commands.
#
# First-time setup:
#   docker compose --profile setup run --rm setup
#
# Start the runtime container:
#   docker compose up -d
# =============================================================================

x-unit3d-build: &unit3d-build
  context: ..
  dockerfile: docker/Dockerfile
  args:
    PYTHON_VERSION: 3.11

x-unit3d-environment: &unit3d-environment
  MEDIA_DIR: ${MEDIA_DIR:-${CONTAINER_MEDIA_DIR:-/data}}
  TMDB_API_KEY: ${TMDB_API_KEY:-}
  AITH_API_KEY: ${AITH_API_KEY:-}
  BLU_API_KEY: ${BLU_API_KEY:-}
  FNP_API_KEY: ${FNP_API_KEY:-}
  LST_API_KEY: ${LST_API_KEY:-}
  OE_API_KEY: ${OE_API_KEY:-}
  RFX_API_KEY: ${RFX_API_KEY:-}
  UPLOADCX_API_KEY: ${UPLOADCX_API_KEY:-}
  RAS_API_KEY: ${RAS_API_KEY:-}
  HHD_API_KEY: ${HHD_API_KEY:-}
  SITES_ENABLED: ${SITES_ENABLED:-}
  GG_PATH: ${GG_PATH:-}
  UA_PATH: ${UA_PATH:-}
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

x-unit3d-volumes: &unit3d-volumes
  # Default single media root. For multiple unrelated host roots, add each
  # extra mount here once and set MEDIA_DIR to the matching container paths.
  - ${HOST_MEDIA_DIR:-./data}:${CONTAINER_MEDIA_DIR:-/data}:ro
  - ./config:/app/data:rw
  - ./outputs:/app/outputs:rw

x-unit3d-base: &unit3d-base
  build: *unit3d-build
  image: unit3d-checker:latest
  stdin_open: true
  tty: true
  working_dir: /app
  environment: *unit3d-environment
  volumes: *unit3d-volumes

services:
  unit3d-checker:
    <<: *unit3d-base
    container_name: unit3d-upload-checker
    restart: unless-stopped
    command: bash

    # Import-only healthcheck. Do not import settings.py here because settings
    # initialization can create or rewrite /app/data/settings.json.
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; import mediainfo; from PTN.parse import PTN"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  setup:
    <<: *unit3d-base
    profiles:
      - setup
    command: /app/scripts/setup.sh

# =============================================================================
# VPN / Network Notes
# =============================================================================
# By default, this uses Docker's default bridge network.
#
# To route traffic through an existing VPN container, add one of these to the
# unit3d-checker service and remove any incompatible networks/ports:
#   network_mode: "container:vpn"
#   network_mode: "service:vpn"
#
# If your VPN stack uses an external network, declare it below and attach the
# service to it:
#
# networks:
#   vpn_network:
#     external: true
#     name: vpn_network
# =============================================================================
